<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<link rel="stylesheet" href="/css/style.css">

<head>
	<meta charset="UTF-8">
	<title>食事登録画面</title>
</head>

<body>
	<header>
		<h1>登録</h1>
	</header>
	<main>
		<form action="/dishes/add" method="post">
			<table border="1">

				<tr>
					<th>主食</th>
					<td>
						<select name="stapleFood" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>副菜</th>
					<td>
						<select name="sideDish" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>主菜</th>
					<td>
						<select name="mainDish" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>牛乳・乳製品</th>
					<td>
						<select name="milkDish" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'">
							</option>
						</select>
					</td>
				</tr>
				<tr>
					<th>果物</th>
					<td>
						<select name="fruitCount" required>
							<option value="" disabled selected>選択してください</option>
							<option th:each="i:${#numbers.sequence(0,10)}" th:value="${i}" th:text="${i} + 'つ'">
							</option>
						</select>
					</td>
				</tr>

			</table>
			<button type="submit">登録</button>
			<button formmethod="get" formaction="/dishes/note">詳細登録</button>
		</form>
		
		<img src="https://www.maff.go.jp/j/balance_guide/img/kihon_syoku.jpg">

	</main>

</body>

</html>
