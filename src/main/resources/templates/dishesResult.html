<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<link rel="stylesheet" href="/css/result.css">
<head>
	<meta charset="UTF-8">
	<title>食事登録内容一覧表示画面</title>
</head>

<body>
	<header>
		<h1>食事登録内容一覧</h1>
	</header>
	<form action="/dishes/result" method="get">
		<input type="date" name="recordDate">
		<button>検索</button>
	</form>
	<table border="1">
		<tr>
			<th>日付</th>
			<th>主食</th>
			<th>副菜</th>
			<th>食菜</th>
			<th>牛乳・乳製品</th>
			<th>果物</th>
			<th>メモ</th>
			<th>点数</th>
			<th>更新</th>
			<th>削除</th>
		</tr>
		<tr th:each="record:${resultList}">
			<td th:text="${record.recordDate}"></td>
			<td>
				<span th:text="${record.stapleFood}"></span><br>
				<span th:text="${record.stapleFood >=5 && record.stapleFood <=7 ? '〇':'✕'}"  style="color: red"></span>
			</td>
			<td>
				<span th:text="${record.sideDish}"></span><br>
				<span th:text="${record.sideDish >=5 && record.sideDish <=6 ? '〇':'✕'}"  style="color: red"></span>	
			</td>
			<td>
				<span th:text="${record.mainDish}"></span><br>
				<span th:text="${record.mainDish >=3 && record.mainDish <=5 ? '〇':'✕'}"  style="color: red"></span>	
			</td>
			<td> 
				<span th:text="${record.milkDish}"></span><br>
				<span th:text="${record.milkDish ==2 ? '〇':'✕'}"  style="color: red"></span>	
			</td>
			<td>
				<span th:text="${record.fruitCount}"></span><br>
				<span th:text="${record.fruitCount ==2 ? '〇':'✕'}"  style="color: red"></span>
			</td>
			<td class="memo" th:text="${record.detailMemo}"></td>
			<td th:text="${record.achievement}"></td>
			<td>
				<form th:action="@{/dishes/{id}/edit(id=${record.id})}" method="get">
				<button type="submit" class="edit-button">更新</button>
				</form>
			</td>
			<td>
				<form th:action="@{/b2dishes/{id}/delete(id=${record.id})}" method="post">
				<button type="submit" class="delete-button">削除</button>
				</form>
			</td>
		</tr>
		</table>
		
		<form action="/dishes/add" method="get">
			<button class="touroku-button">登録画面</button>
		</form>
		
		<a href="/logout">ログアウト</a>
		
</body>

</html>
