<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザ新規作成画面</title>
</head>
<body>
	<h1>新規登録</h1>
	
	<form action="/users/add" method="post">
		<input type="text" name ="name" placeholder="メールアドレス"><br>
		<input type="text" name ="password" placeholder="名前"><br>
	    <input type="text" name ="age" placeholder="パスワード"><br>
		<input type="text" name ="gender" placeholder="年齢"><br>
		<select name = "gender">
			<option value="0">--選択してください--</option>
			<option value="1">男性</option>
			<option value="2">女性</option>
		</select>
	
		<button>登録</button>
	</form>
</body>
</html>
